apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-orders-green
  labels:
    app: techmarket-orders
    version: green
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: techmarket-orders
      version: green
  template:
    metadata:
      labels:
        app: techmarket-orders
        version: green
    spec:
      containers:
      - name: orders-service
        
        image: nginx:latest 
        ports:
        - containerPort: 3000
        
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 2
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 2