apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-orders-blue
  labels:
    app: techmarket-orders
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmarket-orders
      version: blue
  template:
    metadata:
      labels:
        app: techmarket-orders
        version: blue
    spec:
      containers:
      - name: orders-service
        image: nginx:latest 
        ports:
        - containerPort: 3000
        env:
        - name: APP_ENV
          value: "production"
        - name: DB_HOST
          value: "rds.techmarket.internal"