name: TechMarket Orders - Examen Transversal

on:
  workflow_dispatch: # Gatillo manual para tu Defensa en Vivo frente a la comisión

env:
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "duoc-eks-cluster-cli"
  SERVICE_NAME: "techmarket-orders-svc"
  DEPLOYMENT_GREEN: "techmarket-orders-green"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Garantiza la compatibilidad del runner

jobs:
  # --- JOB 1: ETAPA DE CONSTRUCCIÓN MODULAR (EP1) ---
  run-build-template:
    name: Ejecutar Plantilla de Construcción
    uses: ./.github/workflows/build-template.yml
    with:
      image_tag: "et-2026-release"

  # --- JOB 2: ENTORNO INTEGRADO DE DESPLIEGUE, CAOS Y AUTOREMEDIACIÓN ---
  deploy-and-remediate-bg:
    name: Despliegue Blue-Green con Autoremediación Continua
    needs: run-build-template
    runs-on: ubuntu-latest
    
    steps:
    - name: Código Fuente desde Repositorio
      uses: actions/checkout@v4

    - name: Configuración de Credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Configurar Contexto de Acceso a Clúster EKS
      run: |
        aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    # --- ETAPA DE DETECCIÓN (Asegurar Service + Despliegue Green + Inyección de Caos) ---
    - name: Desplegar Ambiente Green y Validar Sondas de Salud
      id: deploy_green
      run: |
        echo "Asegurando la existencia del Service base en el clúster..."
        kubectl apply -f k8s/orders-service.yaml

        echo "Aprovisionando entorno aislado Green..."
        kubectl apply -f k8s/orders-green.yaml
        
        echo "Simulando anomalía o actualización defectuosa..."
        
        kubectl set image deployment/${{ env.DEPLOYMENT_GREEN }} orders-service=nginx:broken-tag-2026
        
        echo "Esperando ventana crítica de observación de los Health Checks..."
        sleep 20
        
        if ! kubectl rollout status deployment/${{ env.DEPLOYMENT_GREEN }} --timeout=20s; then
          echo "❌ DETECCIÓN: El entorno Green no es saludable. Se deniega el paso a producción."
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "status=success" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    # --- ETAPA DE ACCIÓN REMEDIATIVA (Aislamiento + Purgado + Alerta Cloud) ---
    - name: Ejecutar Acción de Remediación Temprana Blue-Green
      if: steps.deploy_green.outcome == 'failure'
      run: |
        echo "🚨 Alarma del Sistema Activada. Iniciando protocolo de contención..."
        
        echo "1. Salvaguardando el Tráfico: Forzando al Service a mantenerse en entorno BLUE sano..."
        kubectl patch svc ${{ env.SERVICE_NAME }} -p '{"spec":{"selector":{"version":"blue"}}}'
        
        echo "2. Purgando Infraestructura: Eliminando recursos corruptos del entorno Green..."
        kubectl delete -f k8s/orders-green.yaml --ignore-not-found=true
        
        echo "3. Notificación Cloud: Despachando alerta en tiempo real a Amazon SNS..."
        aws sns publish \
          --topic-arn "arn:aws:sns:us-east-1:797969583115:techmarket-orders-alerts" \
          --subject "🚨 INGENIERÍA DEL CAOS: TechMarket Orders Autorecuperado" \
          --message "Alerta en vivo: El sistema detectó una anomalía crítica en el entorno Green. Las sondas automatizadas del pipeline blocking la conmutación de tráfico, purgaron los pods corruptos del clúster EKS y preservaron la disponibilidad en el entorno Blue estable. 100% Uptime asegurado." \
          --region "${{ env.AWS_REGION }}"
          
        echo "✓ Sistema blindado de forma autónoma."

    # --- ETAPA DE CONMUTACIÓN DE TRÁFICO (Si el ambiente Green hubiese estado 100% Sano) ---
    - name: Conmutar Tráfico al Entorno Green
      if: steps.deploy_green.outcome == 'success'
      run: |
        echo "🍏 Entorno Green verificado y saludable de manera conforme."
        echo "Modificando selectores del Service para derivar el 100% del tráfico al nuevo entorno..."
        kubectl patch svc ${{ env.SERVICE_NAME }} -p '{"spec":{"selector":{"version":"green"}}}'
        echo "✓ Despliegue de actualización finalizado exitosamente."
